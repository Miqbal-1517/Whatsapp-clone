<!DOCTYPE html>
<html lang="en">

<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
        <meta name="theme-color" content="#075E54">
        <title>WhatsApp Clone</title>
        <link rel="stylesheet" href="styles.css">
        <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>

<body>
        <div id="loginScreen" class="login-screen">
                <div class="login-card">
                        <i class="fab fa-whatsapp" style="font-size: 60px; color: #25D366;"></i>
                        <h2>WhatsApp Clone</h2>
                        <input type="text" id="usernameInput" placeholder="Enter username" maxlength="20">
                        <button onclick="joinChat()">Start Chat</button>
                        <div class="credit">Muhammad Iqbal | Director IT, MIT</div>
                </div>
        </div>

        <div id="mainApp" class="main-app" style="display: none;">
                <div id="sidebar" class="sidebar">
                        <div class="sidebar-header">
                                <div><i class="fas fa-user-circle"></i> <span id="currentUserName"></span></div>
                                <div><i class="fas fa-circle online-dot"></i> <span id="onlineCount">0</span></div>
                        </div>
                        <div class="search-box">
                                <i class="fas fa-search"></i>
                                <input type="text" id="searchUsers" placeholder="Search">
                        </div>
                        <div id="usersList" class="users-list"></div>
                        <div class="sidebar-footer">Muhammad Iqbal | Director IT, MIT</div>
                </div>

                <div class="chat-area">
                        <div class="chat-header">
                                <button id="menuToggle" class="menu-toggle">☰</button>
                                <div class="chat-title">
                                        <i class="fab fa-whatsapp"></i>
                                        <div>
                                                <h3>Group Chat</h3>
                                                <span id="typingIndicator" class="typing-indicator"></span>
                                        </div>
                                </div>
                        </div>

                        <div class="messages-area" id="messagesArea">
                                <div id="messagesContainer">
                                        <div class="welcome-screen">
                                                <i class="fab fa-whatsapp"></i>
                                                <h3>WhatsApp Clone</h3>
                                                <p>Send messages, voice, files & emojis</p>
                                                <div class="welcome-credit">Muhammad Iqbal | Director IT, MIT</div>
                                        </div>
                                </div>
                        </div>

                        <div class="fixed-input">
                                <div class="input-row">
                                        <button id="attachBtn" class="icon-btn"><i
                                                        class="fas fa-paperclip"></i></button>
                                        <input type="file" id="fileInput" multiple style="display: none;">
                                        <button id="emojiBtn" class="icon-btn"><i
                                                        class="far fa-smile-wink"></i></button>
                                        <div class="input-wrapper">
                                                <textarea id="messageInput" placeholder="Type a message"
                                                        rows="1"></textarea>
                                        </div>
                                        <button id="micBtn" class="icon-btn mic-btn"><i
                                                        class="fas fa-microphone"></i></button>
                                        <button id="sendBtn" class="send-btn"><i
                                                        class="fas fa-paper-plane"></i></button>
                                </div>
                                <div id="recordingStatus" class="recording-status">🔴 Recording...</div>
                        </div>
                </div>
        </div>

        <div id="overlay" class="overlay" onclick="closeSidebar()"></div>

        <div id="deleteModal" class="delete-modal">
                <div class="delete-modal-content">
                        <div class="delete-option" onclick="deleteForEveryone()"><i class="fas fa-trash-alt"></i> Delete
                                for everyone</div>
                        <div class="delete-option" onclick="deleteForMe()"><i class="fas fa-user-slash"></i> Delete for
                                me</div>
                        <div class="delete-option cancel" onclick="closeDeleteModal()">Cancel</div>
                </div>
        </div>

        <script src="/socket.io/socket.io.js"></script>
        <script src="script.js"></script>
</body>

</html>
